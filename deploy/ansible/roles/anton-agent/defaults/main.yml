# Anton Agent - Default Variables
# Override these in your playbook, inventory, or via --extra-vars

# User to run the agent as
anton_user: "anton"

# Agent port
anton_port: 9876

# Domain for Caddy reverse proxy + TLS
anton_domain: ""

# Required: Anthropic API key (set via --extra-vars or inventory)
anthropic_api_key: ""

# Optional: force a specific auth token (preserves existing if already deployed)
anton_token: ""

# Optional: Braintrust observability
braintrust_api_key: ""

# Whether to start the agent immediately after deploy
anton_start_on_deploy: true

# Firewall: open ports 80/443
anton_configure_firewall: true
