---
# Anton Agent Deployment Role (repo-clone model)
#
# Clones the repo to /opt/anton, installs deps, builds, configures systemd.
# Uses the `anton` CLI for configuration after the repo is set up.

# ── System Dependencies ──────────────────────────────────────────

- name: Install system packages (Debian/Ubuntu)
  apt:
    name:
      - acl
      - curl
      - jq
      - git
      - dnsutils
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - ufw
      - python3
      - python3-pip
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"

# ── Node.js 22 ──────────────────────────────────────────────────

- name: Check Node.js version
  command: node --version
  register: node_check
  ignore_errors: true
  changed_when: false

- name: Add NodeSource repo
  shell: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  when: >
    node_check.rc != 0 or
    (node_check.stdout | regex_replace('^v', '') | split('.') | first | int) < 22

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true
  when: >
    node_check.rc != 0 or
    (node_check.stdout | regex_replace('^v', '') | split('.') | first | int) < 22

# ── pnpm ────────────────────────────────────────────────────────

- name: Check pnpm
  command: pnpm --version
  register: pnpm_check
  ignore_errors: true
  changed_when: false

- name: Install pnpm
  command: npm install -g pnpm
  when: pnpm_check.rc != 0

# ── Anton user ──────────────────────────────────────────────────

- name: Create anton user
  user:
    name: "{{ anton_user }}"
    home: "/home/{{ anton_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure home directory is traversable (for Caddy file serving)
  file:
    path: "/home/{{ anton_user }}"
    mode: "0755"

- name: Create .anton directory
  file:
    path: "/home/{{ anton_user }}/.anton"
    state: directory
    owner: "{{ anton_user }}"
    group: "{{ anton_user }}"
    mode: "0755"

- name: Create published directory (world-readable for Caddy)
  file:
    path: "/home/{{ anton_user }}/.anton/published"
    state: directory
    owner: "{{ anton_user }}"
    group: "{{ anton_user }}"
    mode: "0755"

# ── Clone/update repo ───────────────────────────────────────────

- name: Check if repo exists
  stat:
    path: /opt/anton/.git
  register: repo_check

- name: Remove /opt/anton if not a git repo
  file:
    path: /opt/anton
    state: absent
  when: not repo_check.stat.exists

- name: Create /opt/anton directory
  file:
    path: /opt/anton
    state: directory
    owner: "{{ anton_user }}"
    group: "{{ anton_user }}"
    mode: "0755"
  when: not repo_check.stat.exists

- name: Clone or update repo
  become: true
  become_user: "{{ anton_user }}"
  git:
    repo: "https://github.com/OmGuptaIND/computer.git"
    dest: /opt/anton
    version: "{{ anton_branch | default('main') }}"
    force: true
  tags: [build]

# ── Install + Build ─────────────────────────────────────────────

- name: Install dependencies
  become: true
  become_user: "{{ anton_user }}"
  command: pnpm install
  args:
    chdir: /opt/anton
  changed_when: true
  tags: [build]

- name: Build all packages
  become: true
  become_user: "{{ anton_user }}"
  command: pnpm -r build
  args:
    chdir: /opt/anton
  changed_when: true
  tags: [build]

# ── Anton CLI ────────────────────────────────────────────────────

- name: Install anton wrapper script
  copy:
    dest: /usr/local/bin/anton
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec node /opt/anton/packages/cli/dist/index.js "$@"

# ── Agent Setup via CLI ──────────────────────────────────────────

- name: Read existing token from env file (if any)
  shell: "grep '^ANTON_TOKEN=' /home/anton/.anton/agent.env 2>/dev/null | cut -d= -f2 || echo ''"
  register: existing_token
  changed_when: false
  ignore_errors: true

- name: Resolve agent token (existing > provided > auto-generate)
  set_fact:
    resolved_token: "{{ existing_token.stdout | trim or anton_token }}"

- name: Write environment file
  copy:
    dest: "/home/{{ anton_user }}/.anton/agent.env"
    owner: "{{ anton_user }}"
    group: "{{ anton_user }}"
    mode: "0600"
    content: |
      HOME=/home/{{ anton_user }}
      ANTON_DIR=/home/{{ anton_user }}/.anton
      ANTON_TOKEN={{ resolved_token | default('') }}
      {% if anthropic_api_key | length > 0 %}ANTHROPIC_API_KEY={{ anthropic_api_key }}{% endif %}
      {% if braintrust_api_key | default('') | length > 0 %}BRAINTRUST_API_KEY={{ braintrust_api_key }}{% endif %}
  notify: restart anton-agent

# ── Systemd service ──────────────────────────────────────────────

- name: Create anton-agent systemd service
  copy:
    dest: /etc/systemd/system/anton-agent.service
    content: |
      [Unit]
      Description=Anton Agent
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ anton_user }}
      Group={{ anton_user }}
      EnvironmentFile=/home/{{ anton_user }}/.anton/agent.env
      WorkingDirectory=/opt/anton
      ExecStart=/usr/bin/node /opt/anton/packages/agent-server/dist/index.js --port {{ anton_port }}
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify: restart anton-agent

- name: Enable and start anton-agent
  systemd:
    name: anton-agent
    enabled: true
    state: started
    daemon_reload: true

# ── Configure via CLI ────────────────────────────────────────────

- name: Set ANTHROPIC_API_KEY
  command: anton computer config set ANTHROPIC_API_KEY {{ anthropic_api_key }}
  when: anthropic_api_key | length > 0
  changed_when: true
  no_log: true
  notify: restart anton-agent

- name: Set DOMAIN
  command: anton computer config set DOMAIN {{ anton_domain }}
  when: anton_domain | length > 0
  changed_when: true

- name: Configure OAuth
  command: >
    anton computer config oauth
    --proxy-url https://oauth.antoncomputer.in
    --callback-url https://{{ anton_domain }}
  when: anton_domain | length > 0
  changed_when: true

- name: Configure Braintrust
  command: anton computer config braintrust --api-key {{ braintrust_api_key }}
  when: braintrust_api_key | length > 0
  changed_when: true
  no_log: true

# ── Firewall ────────────────────────────────────────────────────

- name: Allow SSH (UFW)
  ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: anton_configure_firewall and ansible_facts["os_family"] == "Debian"
  ignore_errors: true

- name: Open HTTP port (UFW)
  ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: anton_configure_firewall and ansible_facts["os_family"] == "Debian"
  ignore_errors: true

- name: Open HTTPS port (UFW)
  ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: anton_configure_firewall and ansible_facts["os_family"] == "Debian"
  ignore_errors: true

- name: Enable UFW
  ufw:
    state: enabled
  when: anton_configure_firewall and ansible_facts["os_family"] == "Debian"
  ignore_errors: true

# ── Caddy ────────────────────────────────────────────────────────

- name: Check if Caddy is installed
  command: caddy version
  register: caddy_check
  ignore_errors: true
  changed_when: false

- name: Add Caddy GPG key
  shell: curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  when: caddy_check.rc != 0 and ansible_facts["os_family"] == "Debian"

- name: Add Caddy apt repository
  shell: curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    creates: /etc/apt/sources.list.d/caddy-stable.list
  when: caddy_check.rc != 0 and ansible_facts["os_family"] == "Debian"

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: true
  when: caddy_check.rc != 0 and ansible_facts["os_family"] == "Debian"

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: anton_domain | length > 0
  notify: reload caddy

- name: Enable and start Caddy
  systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
  when: anton_domain | length > 0

# ── Handlers ─────────────────────────────────────────────────────

# ── Print connection info ────────────────────────────────────────

- name: Read final token
  shell: "grep '^ANTON_TOKEN=' /home/anton/.anton/agent.env 2>/dev/null | cut -d= -f2 || echo 'check agent.env'"
  register: final_token
  changed_when: false
  ignore_errors: true

- name: Set connection info
  set_fact:
    anton_connect: "{{ 'https://' + anton_domain if anton_domain | length > 0 else ansible_host | default(inventory_hostname) + ':' + anton_port | string }}"

- name: Print deployment info
  debug:
    msg: |
      Anton Agent deployed successfully!

      Repo:    /opt/anton
      Connect: {{ anton_connect }}
      Token:   {{ final_token.stdout | default('check /home/anton/.anton/agent.env') }}

      Service commands:
        sudo systemctl status anton-agent
        sudo systemctl restart anton-agent
        sudo journalctl -u anton-agent -f
