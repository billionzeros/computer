---
# Anton Agent Deployment Playbook
#
# Deploy to inventory:
#   ansible-playbook playbook.yml
#
# Deploy to a specific host:
#   ansible-playbook playbook.yml -i "203.0.113.10," -e "ansible_user=root ansible_ssh_private_key_file=~/.ssh/key"
#
# With API key:
#   ansible-playbook playbook.yml -e "anthropic_api_key=sk-ant-..."
#
# Or use the wrapper:
#   ./deploy.sh 203.0.113.10 ~/.ssh/key

- name: Deploy Anton Agent
  hosts: all
  become: true
  gather_facts: true

  roles:
    - anton-agent
