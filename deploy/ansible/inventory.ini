# ──────────────────────────────────────────────────────────────────
# Anton Agent - Inventory
# ──────────────────────────────────────────────────────────────────
#
# 1. Add your VPS servers under [anton_agents]
# 2. Set the shared SSH key and user in [anton_agents:vars]
# 3. Run:  make deploy
#
# Per-host overrides are supported — just add the variable inline.

[anton_agents]
# agent1  ansible_host=203.0.113.10
# agent2  ansible_host=203.0.113.20
# agent3  ansible_host=10.0.0.5  ansible_user=ubuntu  ansible_ssh_private_key_file=~/.ssh/other_key

[anton_agents:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa
# anthropic_api_key=sk-ant-api03-xxxxx
