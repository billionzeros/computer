version: "3.8"

# Self-hosted AntonComputer broker
# Run: docker compose up -d

services:
  broker:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      - ANTON_BROKER_PORT=8765
      # - ANTON_BROKER_TLS_CERT=/certs/cert.pem
      # - ANTON_BROKER_TLS_KEY=/certs/key.pem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
