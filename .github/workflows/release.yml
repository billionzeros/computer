# Build agent binaries and create a GitHub Release when a version tag is pushed.
#
# Triggered by: git push origin main --tags (after running ./scripts/release.sh)
#
# What it does:
#   1. Builds all TypeScript packages
#   2. Bundles agent-server into a single JS file with esbuild
#   3. Creates a Node.js SEA (Single Executable Application) for linux-x64 and linux-arm64
#   4. Extracts changelog for this version
#   5. Creates a GitHub Release with binaries + changelog
#   6. Updates manifest.json with the final git hash and pushes to main

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # Only build linux binaries — VMs are always linux.
    # macOS/darwin builds are not needed (desktop app is Tauri, not the agent).
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build TypeScript packages
        run: |
          pnpm --filter @anton/protocol build
          pnpm --filter @anton/agent-config build
          pnpm --filter @anton/agent-core build
          pnpm --filter @anton/agent-server build

      - name: Bundle with esbuild
        run: |
          npx esbuild packages/agent-server/dist/index.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=esm \
            --outfile=agent-bundle.mjs \
            --external:node-pty \
            --external:chokidar \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"

      - name: Create SEA config
        run: |
          cat > sea-config.json << 'EOF'
          {
            "main": "agent-bundle.mjs",
            "output": "sea-prep.blob",
            "disableExperimentalSEAWarning": true,
            "useSnapshot": false,
            "useCodeCache": true
          }
          EOF

      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Create executable
        run: |
          # Copy the node binary as our base
          cp $(which node) anton-agent-${{ matrix.target }}

          # Inject the SEA blob
          npx postject anton-agent-${{ matrix.target }} NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          # Make executable
          chmod +x anton-agent-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anton-agent-${{ matrix.target }}
          path: anton-agent-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const regex = new RegExp('## \\\\[' + '${VERSION}'.replace(/\\./g, '\\\\.') + '\\\\][\\\\s\\\\S]*?(?=\\n---)', 'm');
            const match = changelog.match(regex);
            if (match) {
              console.log(match[0]);
            } else {
              console.log('Release v${VERSION}');
            }
          ")
          # Write to file for gh release
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            artifacts/anton-agent-linux-x64/anton-agent-linux-x64 \
            artifacts/anton-agent-linux-arm64/anton-agent-linux-arm64

      - name: Update manifest with git hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)

          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.gitHash = '${GIT_HASH}';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "ci: update manifest.json with git hash for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
