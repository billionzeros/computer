# Build agent binaries + desktop app installers, then create a GitHub Release.
#
# Triggered by: git push origin main --tags (after running `make release`)
#
# What it does:
#   1. Builds agent SEA binaries for linux-x64 and linux-arm64
#   2. Builds desktop app for macOS (dmg), Windows (msi), Linux (AppImage/deb)
#   3. Extracts changelog for this version
#   4. Creates a GitHub Release with all artifacts + changelog
#   5. Updates manifest.json with the final git hash

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Agent binaries (linux only) ──────────────────────────────────
  agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build TypeScript packages
        run: |
          pnpm --filter @anton/protocol build
          pnpm --filter @anton/agent-config build
          pnpm --filter @anton/agent-core build
          pnpm --filter @anton/agent-server build

      - name: Bundle with esbuild
        run: |
          npx esbuild packages/agent-server/dist/index.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=cjs \
            --outfile=agent-bundle.js \
            --external:node-pty \
            --external:chokidar

      - name: Create SEA binary
        run: |
          cat > sea-config.json << 'EOF'
          {
            "main": "agent-bundle.js",
            "output": "sea-prep.blob",
            "disableExperimentalSEAWarning": true,
            "useSnapshot": false,
            "useCodeCache": true
          }
          EOF

          node --experimental-sea-config sea-config.json
          cp $(which node) anton-agent-${{ matrix.target }}

          npx postject anton-agent-${{ matrix.target }} NODE_SEA_BLOB sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          chmod +x anton-agent-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anton-agent-${{ matrix.target }}
          path: anton-agent-${{ matrix.target }}

  # ── Sidecar binaries (Go, linux only) ────────────────────────────
  sidecar:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
          - os: ubuntu-24.04-arm
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: sidecar/go.sum

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build sidecar binary
        working-directory: sidecar
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o anton-sidecar-linux-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anton-sidecar-linux-${{ matrix.goarch }}
          path: sidecar/anton-sidecar-linux-${{ matrix.goarch }}

  # ── CLI (single .mjs file, platform-independent) ─────────────────
  # ink/yoga-layout use top-level await (ESM-only) which is incompatible
  # with Node.js SEA (CJS-only). We ship a single .mjs bundle instead.
  # The install script creates a wrapper that invokes it with node.
  cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build TypeScript
        run: |
          pnpm --filter @anton/protocol build
          pnpm --filter @anton/cli build

      - name: Get CLI version
        id: cli_version
        run: echo "version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/cli/package.json','utf8')).version)")" >> "$GITHUB_OUTPUT"

      - name: Bundle CLI with esbuild
        run: |
          # Stub out react-devtools-core (ink imports it but it's optional/dev-only)
          mkdir -p .stubs
          echo "export default {};" > .stubs/react-devtools-core.mjs

          npx esbuild packages/cli/dist/index.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=esm \
            --outfile=anton-cli.mjs \
            --external:node-pty \
            --alias:react-devtools-core=./.stubs/react-devtools-core.mjs \
            --define:__CLI_VERSION__=\"${{ steps.cli_version.outputs.version }}\" \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"
          chmod +x anton-cli.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anton-cli
          path: anton-cli.mjs

  # ── Desktop app (macOS, Windows, Linux) ──────────────────────────
  desktop:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build protocol (desktop dependency)
        run: pnpm --filter @anton/protocol build

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz
            packages/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            packages/desktop/src-tauri/target/release/bundle/**/*.msi
            packages/desktop/src-tauri/target/release/bundle/**/*.msi.sig
            packages/desktop/src-tauri/target/release/bundle/**/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/**/*.AppImage.sig
            packages/desktop/src-tauri/target/release/bundle/**/*.deb

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [agent, sidecar, cli, desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const regex = new RegExp('## \\\\[' + '${VERSION}'.replace(/\\./g, '\\\\.') + '\\\\][\\\\s\\\\S]*?(?=\\n---)', 'm');
            const match = changelog.match(regex);
            fs.writeFileSync('release-notes.md', match ? match[0] : 'Release v${VERSION}');
          "

      - name: Collect all release assets
        run: |
          mkdir -p release-assets
          # Agent binaries
          cp artifacts/anton-agent-linux-x64/anton-agent-linux-x64 release-assets/ 2>/dev/null || true
          cp artifacts/anton-agent-linux-arm64/anton-agent-linux-arm64 release-assets/ 2>/dev/null || true
          # Sidecar binaries
          cp artifacts/anton-sidecar-linux-amd64/anton-sidecar-linux-amd64 release-assets/ 2>/dev/null || true
          cp artifacts/anton-sidecar-linux-arm64/anton-sidecar-linux-arm64 release-assets/ 2>/dev/null || true
          # CLI
          cp artifacts/anton-cli/anton-cli.mjs release-assets/ 2>/dev/null || true
          # Desktop installers — find recursively since Tauri nests them
          find artifacts/desktop-* -type f \( \
            -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.msi.sig" -o -name "*.AppImage.sig" \
          \) -exec cp {} release-assets/ \;
          # Tauri updater manifest (latest.json) — generated by tauri-action
          find artifacts/desktop-* -name "latest.json" -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            release-assets/*

      - name: Update manifest with git hash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)

          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.gitHash = '${GIT_HASH}';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "ci: update manifest.json with git hash for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
